repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: eslint
        name: ESLint
        language: system
        entry: bash -c 'cd frontend && npm run lint'
        files: \.(js|jsx)$
        pass_filenames: false
